name: package-compiler

on:
  workflow_dispatch:
    inputs:
      rid:
        description: "Runtime Identifier (RID)"
        required: true
        default: "win-x64"
      configuration:
        description: "Build configuration"
        required: true
        default: "Release"
      skip_selftest:
        description: "Skip selftest"
        required: true
        default: "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    env:
      RID: ${{ github.event_name == 'workflow_dispatch' && inputs.rid || 'win-x64' }}
      CONFIGURATION: ${{ github.event_name == 'workflow_dispatch' && inputs.configuration || 'Release' }}
      SKIP_SELFTEST: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_selftest || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build Alice.sln -c $env:CONFIGURATION
        shell: pwsh

      - name: Selftest
        if: env.SKIP_SELFTEST != 'true'
        run: dotnet run --project src/alicec -- selftest
        shell: pwsh

      - name: Package (tools/package.ps1)
        run: |
          $args = @(
            '-Rid', $env:RID,
            '-Configuration', $env:CONFIGURATION
          )
          if ($env:SKIP_SELFTEST -eq 'true') { $args += '-SkipSelfTest' }
          powershell -NoProfile -ExecutionPolicy Bypass -File tools\package.ps1 @args
        shell: pwsh

      - name: Upload artifacts (zip)
        uses: actions/upload-artifact@v4
        with:
          name: alicec-dist-${{ env.RID }}
          path: |
            artifacts/alicec-dist-${{ env.RID }}-framework.zip
            artifacts/alicec-dist-${{ env.RID }}-selfcontained.zip
          if-no-files-found: error

      - name: Create GitHub Release (tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/alicec-dist-${{ env.RID }}-framework.zip
            artifacts/alicec-dist-${{ env.RID }}-selfcontained.zip
